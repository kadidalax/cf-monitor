name: Release Agent

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v1.0.1'
        required: true
        default: 'v1.0.1'

permissions:
  contents: write

jobs:
  build-agent:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    env:
      CGO_ENABLED: '0'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum

      - name: Build agent binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          build() {
            local goos="$1"
            local goarch="$2"
            local output="$3"
            echo "Building ${output}"
            GOOS="$goos" GOARCH="$goarch" go build -trimpath -ldflags="-s -w" -o "dist/${output}" .
          }

          build linux amd64 cf-monitor-agent-linux-amd64
          build linux arm64 cf-monitor-agent-linux-arm64
          build darwin amd64 cf-monitor-agent-darwin-amd64
          build darwin arm64 cf-monitor-agent-darwin-arm64
          build windows amd64 cf-monitor-agent-windows-amd64.exe

          cd dist
          sha256sum * > checksums.txt

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* \
              --title "CF Monitor ${RELEASE_TAG}" \
              --notes "Prebuilt CF Monitor agent binaries."
          fi

