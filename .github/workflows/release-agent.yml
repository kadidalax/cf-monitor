name: Release Agent

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v2.0.0'
        required: true
        default: 'v2.0.0'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-agent:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    env:
      CGO_ENABLED: '0'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build agent binaries
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p dist
          agent_version="${RELEASE_TAG#v}"
          if [[ -z "$agent_version" ]]; then
            echo "Cannot derive agent version from release tag: ${RELEASE_TAG}" >&2
            exit 1
          fi
          ldflags="-s -w -X main.Version=${agent_version}"
          echo "Embedding agent version ${agent_version}"

          build() {
            local goos="$1"
            local goarch="$2"
            local output="$3"
            echo "Building ${output}"
            GOOS="$goos" GOARCH="$goarch" go build -trimpath -ldflags="$ldflags" -o "dist/${output}" .
          }

          build linux amd64 cf-monitor-agent-linux-amd64
          build linux arm64 cf-monitor-agent-linux-arm64
          build darwin amd64 cf-monitor-agent-darwin-amd64
          build darwin arm64 cf-monitor-agent-darwin-arm64
          build windows amd64 cf-monitor-agent-windows-amd64.exe

          cd dist
          sha256sum * > checksums.txt

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* \
              --title "CF Monitor ${RELEASE_TAG}" \
              --notes "Prebuilt CF Monitor agent binaries."
          fi
