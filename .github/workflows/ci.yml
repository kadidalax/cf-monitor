name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint worker
        run: |
          cd worker
          npm run build

      - name: Build frontend
        run: |
          cd frontend
          npm run build

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run blocking npm audit
        run: |
          npm audit --omit=dev --audit-level=high
          npm --prefix worker audit --omit=dev --audit-level=high
          npm --prefix frontend audit --omit=dev --audit-level=high

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check worker
        run: |
          cd worker
          npx tsc --noEmit

      - name: Type check frontend
        run: |
          cd frontend
          npx tsc -b

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm --prefix frontend run test

      - name: Run worker tests
        run: npm --prefix worker run test

  d1-migrations:
    name: D1 Local Migration Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Apply worker local D1 migrations
        run: npm --prefix worker run db:migrate:local

      - name: Verify worker migration list is clean
        run: node ./worker/node_modules/wrangler/bin/wrangler.js d1 migrations list cf-monitor-db --local --config worker/wrangler.toml

      - name: Verify root migration list is clean
        run: node ./worker/node_modules/wrangler/bin/wrangler.js d1 migrations list cf-monitor-db --local --config wrangler.toml

  agent:
    name: Go Agent
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum

      - name: Test agent
        working-directory: agent
        run: go test ./...

      - name: Build agent smoke
        working-directory: agent
        run: go build -o /tmp/cf-monitor-agent .

  scripts:
    name: Script Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Linux installer syntax
        run: bash -n agent/install-linux.sh

      - name: Check Windows installer syntax
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path 'agent/install-windows.ps1'), [ref]$tokens, [ref]$errors) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }
