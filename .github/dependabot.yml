version: 2
updates:
  # Worker dependencies
  - package-ecosystem: npm
    directory: "/worker"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - worker
    commit-message:
      prefix: "chore(worker)"
    groups:
      production-dependencies:
        dependency-type: production
      development-dependencies:
        dependency-type: development

  # Frontend dependencies
  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: "chore(frontend)"
    groups:
      production-dependencies:
        dependency-type: production
      development-dependencies:
        dependency-type: development

  # Root dependencies
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 3
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(ci)"
