name = "cf-monitor"
main = "src/index.ts"
compatibility_date = "2025-04-01"

[triggers]
crons = ["* * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "cf-monitor-db"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"
migrations_dir = "migrations"
migrations_pattern = "migrations/{001_init,003_query_indexes,004_remove_removed_settings,005_login_rate_limits,006_ping_task_sort_order,007_client_sort_order,008_record_high_watermark,009_expiry_notifications,010_optimize_ping_indexes,011_align_runtime_interval_settings,012_ping_snapshots,013_gpu_snapshots,014_drop_redundant_client_indexes,015_ping_persist_interval,016_history_row_counters,017_last_seen_sessions_notifications,018_client_token_hash,019_notification_deliveries,020_public_privacy_mode,021_notification_incidents,022_token_hash_index,023_client_report_interval,024_latest_records,025_password_reset_tokens}.sql"

[[durable_objects.bindings]]
name = "LIVE_DATA"
class_name = "LiveDataDO"

[[durable_objects.bindings]]
name = "RATE_LIMIT"
class_name = "RateLimitDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["LiveDataDO"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["RateLimitDO"]

[vars]
SITE_TITLE = "CF Monitor"
SITE_DESCRIPTION = "Server monitor probe"

[assets]
directory = "../frontend/dist"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/ping"]
